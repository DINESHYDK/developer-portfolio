  <path d="M207,281 Q210,292 208,302"
        fill="none" stroke="#8ECAE6" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>

  <!-- === NECK === -->
  <rect x="191" y="258" width="18" height="16" rx="5" fill="#FDBCB4"/>

  <!-- === HEAD === -->
  <ellipse cx="200" cy="234" rx="34" ry="32" fill="#FDBCB4"/>

  <!-- === HAIR === -->
  <ellipse cx="200" cy="217" rx="35" ry="24" fill="#2C2C2C"/>
  <path d="M170,225 Q177,200 193,207 Q186,217 189,231" fill="#2C2C2C"/>
  <path d="M180,220 Q190,195 203,202 Q197,213 198,228" fill="#2C2C2C"/>
  <path d="M198,220 Q208,196 221,203 Q214,214 212,229" fill="#2C2C2C"/>
  <path d="M208,223 Q218,202 228,209 Q222,219 220,232" fill="#2C2C2C"/>
  <path d="M168,231 Q164,241 168,251"
        fill="none" stroke="#2C2C2C" stroke-width="9" stroke-linecap="round"/>
  <path d="M232,231 Q236,241 232,251"
        fill="none" stroke="#2C2C2C" stroke-width="9" stroke-linecap="round"/>

  <!-- === FACE (excited — wide eyes, open smile) === -->
  <ellipse cx="189" cy="237" rx="5.5" ry="6"   fill="#2C2C2C"/>
  <ellipse cx="211" cy="237" rx="5.5" ry="6"   fill="#2C2C2C"/>
  <circle cx="191.2" cy="234.8" r="1.6" fill="white" opacity="0.90"/>
  <circle cx="213.2" cy="234.8" r="1.6" fill="white" opacity="0.90"/>
  <!-- Nose -->
  <path d="M197,245 Q200,249 203,245"
        fill="none" stroke="#e8a898" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Excited wide smile -->
  <path d="M189,254 Q200,264 211,254"
        fill="none" stroke="#e8a898" stroke-width="2" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="181" cy="246" rx="5.5" ry="3" fill="#e8a898" opacity="0.32"/>
  <ellipse cx="219" cy="246" rx="5.5" ry="3" fill="#e8a898" opacity="0.32"/>

  <!-- === HEADPHONES === -->
  <path d="M168,233 Q168,201 200,199 Q232,201 232,231"
        fill="none" stroke="#1a1a2e" stroke-width="5.5" stroke-linecap="round"/>
  <ellipse cx="168" cy="237" rx="10" ry="12"
           fill="#2d2d4e" stroke="#1a1a2e" stroke-width="1.5"/>
  <ellipse cx="168" cy="237" rx="6"  ry="7.5" fill="#4ecca3" opacity="0.80"/>
  <ellipse cx="232" cy="235" rx="10" ry="12"
           fill="#2d2d4e" stroke="#1a1a2e" stroke-width="1.5"/>
  <ellipse cx="232" cy="235" rx="6"  ry="7.5" fill="#4ecca3" opacity="0.80"/>

</svg>