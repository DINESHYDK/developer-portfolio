  <circle cx="26" cy="109" r="3.5" fill="#4ecca3" opacity="0.9"/>
  <circle cx="38" cy="109" r="3.5" fill="#8ECAE6" opacity="0.7"/>
  <circle cx="50" cy="109" r="3.5" fill="#2d2d4e"  opacity="0.8"/>
  <!-- Wireframe: header bar -->
  <rect x="22" y="124" width="94" height="10" rx="2" fill="#2d2d4e" opacity="0.7"/>
  <!-- Wireframe: two columns -->
  <rect x="22" y="140" width="44" height="36" rx="2" fill="#1a1a2e" stroke="#2d2d4e" stroke-width="1"/>
  <rect x="72" y="140" width="44" height="36" rx="2" fill="#1a1a2e" stroke="#2d2d4e" stroke-width="1"/>
