  <circle cx="277" cy="279" r="3.5" fill="#4ecca3" opacity="0.9"/>
  <circle cx="289" cy="279" r="3.5" fill="#8ECAE6" opacity="0.7"/>
  <circle cx="301" cy="279" r="3.5" fill="#2d2d4e"  opacity="0.8"/>
  <!-- Terminal text lines -->
  <text x="273" y="303" font-family="monospace" font-size="7.5" fill="#4ecca3" opacity="0.9">$ npm run dev</text>
  <text x="273" y="315" font-family="monospace" font-size="7.5" fill="#8ECAE6" opacity="0.75">  ✓ compiled</text>
  <text x="273" y="327" font-family="monospace" font-size="7.5" fill="#4ecca3" opacity="0.80">  → localhost:3000</text>
  <text x="273" y="339" font-family="monospace" font-size="7.5" fill="#4ecca3" opacity="0.55">█</text>

  <!-- === LEGS / JEANS === -->
  <path d="M178,336 Q172,368 170,405"
        fill="none" stroke="#1a1a2e" stroke-width="26" stroke-linecap="round"/>
  <path d="M202,336 Q210,368 214,405"
        fill="none" stroke="#1a1a2e" stroke-width="26" stroke-linecap="round"/>
  <ellipse cx="169" cy="408" rx="16" ry="7"
