  <line x1="26" y1="148" x2="62" y2="148" stroke="#4ecca3" stroke-width="1" opacity="0.4"/>
  <line x1="26" y1="155" x2="55" y2="155" stroke="#2d2d4e" stroke-width="1" opacity="0.6"/>
  <line x1="26" y1="162" x2="58" y2="162" stroke="#2d2d4e" stroke-width="1" opacity="0.6"/>
  <line x1="76" y1="148" x2="112" y2="148" stroke="#4ecca3" stroke-width="1" opacity="0.4"/>
  <line x1="76" y1="155" x2="105" y2="155" stroke="#2d2d4e" stroke-width="1" opacity="0.6"/>
  <line x1="76" y1="162" x2="108" y2="162" stroke="#2d2d4e" stroke-width="1" opacity="0.6"/>

  <!-- === WINDOW 2 — Mobile Phone Frame (top-right) === -->
  <rect x="272" y="40" width="68" height="116" rx="12"
