<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420">

  <!-- === SVG 3 — What I Build === -->

  <!-- === DECORATIVE FLOATING DOTS === -->
  <circle cx="20"  cy="50"  r="4"   fill="#4ecca3" opacity="0.40"/>
  <circle cx="380" cy="80"  r="3"   fill="#8ECAE6" opacity="0.35"/>
  <circle cx="15"  cy="220" r="3"   fill="#4ecca3" opacity="0.30"/>
  <circle cx="385" cy="320" r="3.5" fill="#8ECAE6" opacity="0.30"/>
  <circle cx="60"  cy="390" r="2.5" fill="#4ecca3" opacity="0.25"/>

  <!-- === WINDOW 1 — Browser Frame (left) === -->
  <rect x="14" y="100" width="110" height="84" rx="7"
        fill="#12121A" stroke="#2d2d4e" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="14" y="100" width="110" height="18" rx="7" fill="#2d2d4e"/>
  <rect x="14" y="109" width="110" height="9"       fill="#2d2d4e"/>
